<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ลงทะเบียนน้อง MER_UTT</title>
<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/versions/2.24.0/sdk.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans Thai', 'Segoe UI', sans-serif; }
  body {
    background: linear-gradient(135deg, #06c755 0%, #00913a 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: #fff;
    border-radius: 20px;
    padding: 32px 24px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
  }
  h1 { font-size: 20px; color: #222; text-align: center; margin-bottom: 6px; }
  p.sub { font-size: 13px; color: #888; text-align: center; margin-bottom: 24px; }
  label { display: block; font-size: 14px; color: #444; margin-top: 16px; margin-bottom: 6px; }
  input, select {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid #ddd;
    border-radius: 10px;
    font-size: 15px;
    background: #fff;
  }
  input:focus, select:focus { outline: none; border-color: #06c755; }
  select:disabled { background: #f5f5f5; color: #aaa; }
  button {
    width: 100%;
    margin-top: 28px;
    padding: 14px;
    border: none;
    border-radius: 10px;
    background: #06c755;
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
  }
  button:disabled { background: #aaa; cursor: not-allowed; }
  #loading { text-align: center; color: #888; font-size: 14px; padding: 20px 0; }
  #statusBox { display: none; text-align: center; }
  #statusIcon { font-size: 40px; }
  #statusTitle { font-size: 17px; font-weight: 600; margin-top: 6px; color: #222; }
  #statusMessage { font-size: 13px; color: #888; margin-top: 4px; }
  .errorText { display: none; color: #e74c3c; font-size: 12px; margin-top: 5px; }
</style>
</head>
<body>

<div class="card">
  <div id="loading">กำลังโหลด...</div>

  <div id="formBox" style="display:none;">
    <h1>ลงทะเบียนน้อง MER_UTT</h1>
    <p class="sub">กรอกข้อมูลเพื่อลงทะเบียนเข้าระบบ</p>

    <label for="nameInput">ชื่อ-สกุล</label>
    <input type="text" id="nameInput" placeholder="เช่น สมชาย ใจดี">

    <label for="phoneInput">เบอร์โทรศัพท์</label>
    <input type="tel" id="phoneInput" placeholder="เช่น 0812345678" maxlength="10" inputmode="numeric">
    <div id="phoneError" class="errorText">เบอร์โทรต้องเป็นเลข 10 หลัก และขึ้นต้นด้วย 0</div>

    <label for="channelSelect">ประเภทช่องทาง (Channel)</label>
    <select id="channelSelect">
      <option value="">-- เลือกประเภทช่องทาง --</option>
    </select>

    <label for="sspSelect">เขต SSP</label>
    <select id="sspSelect" disabled>
      <option value="">-- เลือกประเภทช่องทางก่อน --</option>
    </select>

    <label for="storeSelect">ชื่อร้านค้า/ลูกค้า</label>
    <select id="storeSelect" disabled>
      <option value="">-- เลือกเขต SSP ก่อน --</option>
    </select>

    <button id="submitBtn" onclick="submitForm()">บันทึก</button>
  </div>

  <div id="statusBox">
    <div id="statusIcon"></div>
    <div id="statusTitle"></div>
    <div id="statusMessage"></div>
  </div>
</div>

<script>
const LIFF_ID = '2010481173-WXLYoI29';
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyHwNc1Ko2lw8lsN3ePcGi3yoqYZbGxHMz4ZoEK93nHUvS2ZXHyMzwkwEnWbxvPwO65/exec';

let lineUserId = null;
let storeMasterData = [];

async function initLiff() {
  try {
    await liff.init({ liffId: LIFF_ID });

    if (!liff.isLoggedIn()) {
      liff.login();
      return;
    }

    const profile = await liff.getProfile();
    lineUserId = profile.userId;

    await loadStoreMaster();

    document.getElementById('loading').style.display = 'none';
    document.getElementById('formBox').style.display = 'block';
  } catch (err) {
    document.getElementById('loading').style.display = 'none';
    showStatus('error', 'เกิดข้อผิดพลาด', 'ไม่สามารถโหลด LIFF ได้: ' + err.message);
  }
}

async function loadStoreMaster() {
  try {
    const res = await fetch(GAS_URL + '?action=storemaster');
    const data = await res.json();
    if (data.status === 'success') {
      storeMasterData = data.data || [];
      populateChannels();
    }
  } catch (err) {
    console.error('โหลดรายชื่อ Channel/ร้านค้าไม่สำเร็จ', err);
  }
}

function populateChannels() {
  const select = document.getElementById('channelSelect');
  const seen = {};
  storeMasterData.forEach(function (item) {
    if (!seen[item.channel]) {
      seen[item.channel] = true;
      const opt = document.createElement('option');
      opt.value = item.channel;
      opt.textContent = item.channel;
      select.appendChild(opt);
    }
  });
}

// ชั้น 1 -> ชั้น 2: เลือก Channel แล้วกรอง SSP
document.getElementById('channelSelect').addEventListener('change', function () {
  const selectedChannel = this.value;

  const sspSelect = document.getElementById('sspSelect');
  sspSelect.innerHTML = '<option value="">-- เลือกเขต SSP --</option>';

  const storeSelect = document.getElementById('storeSelect');
  storeSelect.innerHTML = '<option value="">-- เลือกเขต SSP ก่อน --</option>';
  storeSelect.disabled = true;

  if (!selectedChannel) {
    sspSelect.disabled = true;
    return;
  }

  const seen = {};
  storeMasterData
    .filter(function (item) { return item.channel === selectedChannel; })
    .forEach(function (item) {
      if (!seen[item.ssp]) {
        seen[item.ssp] = true;
        const opt = document.createElement('option');
        opt.value = item.ssp;
        opt.textContent = item.ssp;
        sspSelect.appendChild(opt);
      }
    });

  sspSelect.disabled = false;
});

// ชั้น 2 -> ชั้น 3: เลือก SSP แล้วกรองร้านค้า
document.getElementById('sspSelect').addEventListener('change', function () {
  const selectedChannel = document.getElementById('channelSelect').value;
  const selectedSsp = this.value;

  const storeSelect = document.getElementById('storeSelect');
  storeSelect.innerHTML = '<option value="">-- เลือกร้านค้า/ลูกค้า --</option>';

  if (!selectedSsp) {
    storeSelect.disabled = true;
    return;
  }

  storeMasterData
    .filter(function (item) { return item.channel === selectedChannel && item.ssp === selectedSsp; })
    .forEach(function (item) {
      const opt = document.createElement('option');
      opt.value = item.storeId; // ใช้ StoreID เป็นค่าอ้างอิงจริง (กันชื่อซ้ำ)
      opt.textContent = item.storenameTh || item.customer;
      storeSelect.appendChild(opt);
    });

  storeSelect.disabled = false;
});

async function submitForm() {
  const name      = document.getElementById('nameInput').value.trim();
  const phone     = document.getElementById('phoneInput').value.trim();
  const channel   = document.getElementById('channelSelect').value;
  const ssp       = document.getElementById('sspSelect').value;
  const storeId   = document.getElementById('storeSelect').value;
  const phoneErrorEl = document.getElementById('phoneError');
  phoneErrorEl.style.display = 'none';

  if (!name || !phone || !channel || !ssp || !storeId) {
    alert('กรุณากรอกข้อมูลให้ครบทุกช่อง');
    return;
  }

  if (!isValidThaiPhone(phone)) {
    phoneErrorEl.style.display = 'block';
    return;
  }

  const selectedStore = storeMasterData.find(function (item) {
    return item.channel === channel && item.ssp === ssp && item.storeId === storeId;
  });

  const customer    = selectedStore ? selectedStore.customer    : '';
  const storenameTh = selectedStore ? selectedStore.storenameTh : '';
  const province     = selectedStore ? selectedStore.province   : '';

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'กำลังบันทึก...';

  try {
    // หมายเหตุ: ใช้ Content-Type: text/plain เพื่อเลี่ยง CORS preflight (OPTIONS)
    // ซึ่ง GAS Web App ไม่รองรับ — ฝั่ง doPost ยัง parse เป็น JSON ได้ตามปกติ
    const res = await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({
        lineId: lineUserId,
        name: name,
        phone: phone,
        channel: channel,
        ssp: ssp,
        storeId: storeId,
        customer: customer,
        storenameTh: storenameTh,
        province: province
      })
    });

    const data = await res.json();

    document.getElementById('formBox').style.display = 'none';

    if (data.status === 'success') {
      showStatus('success', 'ลงทะเบียนสำเร็จ', 'ขอบคุณที่ลงทะเบียนครับ/ค่ะ');
    } else {
      showStatus('error', 'ลงทะเบียนไม่สำเร็จ', data.message || 'กรุณาลองใหม่อีกครั้ง');
      btn.disabled = false;
      btn.textContent = 'บันทึก';
    }
  } catch (err) {
    document.getElementById('formBox').style.display = 'none';
    showStatus('error', 'เกิดข้อผิดพลาด', err.message);
  }
}

function isValidThaiPhone(phone) {
  return /^0\d{9}$/.test(phone);
}

function showStatus(type, title, message) {
  const box = document.getElementById('statusBox');
  box.style.display = 'block';
  document.getElementById('statusIcon').textContent = type === 'success' ? '✅' : '❌';
  document.getElementById('statusTitle').textContent = title;
  document.getElementById('statusMessage').textContent = message;
}

initLiff();
</script>

</body>
</html>
